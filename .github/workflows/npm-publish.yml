# Publishes to the npm registry when a release is published.
# See: https://docs.github.com/en/actions/tutorials/publish-packages/publish-nodejs-packages

name: Publish Package to npmjs

on:
    release:
        types: [published]

jobs:
    publish-npm:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v5
            - uses: actions/setup-node@v6
              with:
                  node-version: '22.x'
                  registry-url: 'https://registry.npmjs.org'
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - run: pnpm version ${{ github.event.release.tag_name }} --git-tag-version false
            - run: pnpm publish --no-git-checks --provenance
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
